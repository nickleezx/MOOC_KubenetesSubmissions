apiVersion: batch/v1
kind: CronJob
metadata:
  name: create-todo-job
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: project-cron
              image: PROJECT/CRONJOB
              env:
                - name: BACKEND_URL
                  valueFrom:
                    configMapKeyRef:
                      name: project-configmap
                      key: KUBERNETES_BACKEND
          restartPolicy: Never
